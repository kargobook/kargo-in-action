# Chapter: 5. Promoting safely: automatic, manual, and recoverable
# Section: 5.2 Automatic promotion
# Kargo version: 1.x
# Status: UNVERIFIED

apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: dev
  namespace: demo
spec:
  requestedFreight:
  - origin:
      kind: Warehouse
      name: demo-app
    sources:
      direct: true
  promotionTemplate:
    spec:
      steps:
      - uses: git-clone
        config:
          repoURL: https://github.com/kargobook/demo-gitops.git
          checkout:
          - branch: main
            path: ./repo
      - uses: kustomize-set-image
        config:
          path: ./repo/envs/dev
          images:
          - image: ghcr.io/kargobook/demo-app
            tag: ${{ imageFrom("ghcr.io/kargobook/demo-app").Tag }}
      - uses: git-commit
        config:
          path: ./repo
          message: "Promote to dev: ${{ imageFrom("ghcr.io/kargobook/demo-app").Tag }}"
      - uses: git-push
        config:
          path: ./repo
          targetBranch: main
---
apiVersion: kargo.akuity.io/v1alpha1
kind: ProjectConfig
metadata:
  name: demo
  namespace: demo
spec:
  promotionPolicies:
  - stageSelector:
      name: dev
    autoPromotionEnabled: true
