# Chapter: Appendix A. Kargo Resource Reference
# Section: Spec Fields
# Kargo version: 1.x
# Status: UNVERIFIED

apiVersion: kargo.akuity.io/v1alpha1
kind: Project
metadata:
  name: payments
spec:
  promotionPolicies:
  - stage: payments-prod                 # Stage this policy applies to
    autoPromotionEnabled: false          # Disable automatic promotion for this Stage
    authorizedPromoters:                 # Users/ServiceAccounts allowed to create Promotions
    - subjectType: User
      name: alice@example.com
    - subjectType: Group
      name: payments-leads
    - subjectType: ServiceAccount
      name: payments-ci-bot

