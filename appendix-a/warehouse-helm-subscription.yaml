# Chapter: Appendix A. Kargo Resource Reference
# Section: Subscription Fields
# Kargo version: 1.x
# Status: UNVERIFIED

subscriptions:
- chart:
    repoURL: https://charts.example.com        # Helm repo URL
    name: my-chart                             # Chart name
    semverConstraint: ">=2.0.0 <3.0.0"
    discoveryLimit: 10

