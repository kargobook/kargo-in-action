# Chapter: Appendix A. Kargo Resource Reference
# Section: PromotionStepConfig (Enterprise)
# Kargo version: 1.x
# Status: UNVERIFIED

apiVersion: kargo.akuity.io/v1alpha1
kind: PromotionStepConfig
metadata:
  name: risk-assessment-gate
  namespace: kargo
spec:
  image: registry.example.com/kargo-steps/risk-gate:v1.0.0
  configSchema:
    type: object
    required: [apiEndpoint, credentialsSecret]
    properties:
      apiEndpoint:
        type: string
        format: uri
      credentialsSecret:
        type: string
      timeoutMinutes:
        type: integer
        default: 60
  permissions:
  - projects: ["*"]
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "500m"

