# Chapter: 4. Modeling your delivery: Warehouses, Freight, and Stage graphs
# Section: 4.2.2 Multi-artifact Freight
# Kargo version: 1.x
# Status: VERIFIED

apiVersion: kargo.akuity.io/v1alpha1
kind: Warehouse
metadata:
  name: my-app-multi
  namespace: kargo-demo
spec:
  subscriptions:                                     # <1>
  - image:
      repoURL: ghcr.io/example/my-app
      semverConstraint: ^1.0.0
  - image:
      repoURL: ghcr.io/example/my-sidecar            # <2>
      semverConstraint: ^2.0.0
  - chart:
      repoURL: https://charts.example.com            # <3>
      name: my-infra-chart
      semverConstraint: ^0.5.0
