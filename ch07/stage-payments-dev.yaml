# Chapter: 11. Multi-Service Promotion
# Section: Independent Promotion Graphs at Scale
# Kargo version: 1.x
# Status: UNVERIFIED

apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: payments-dev
  namespace: kargo
spec:
  requestedFreight:
  - origin:
      kind: Warehouse
      name: payments-warehouse
    sources:
      direct: true
  promotionTemplate:
    spec:
      steps:
      - uses: git-clone
        config:
          repoURL: https://github.com/kargobook/demo-gitops.git
          checkout:
          - branch: main
            path: ./repo
      - uses: kustomize-set-image
        config:
          path: ./repo/apps/payments/envs/dev
          images:
          - image: ghcr.io/kargobook/payments-api
      - uses: git-commit
        config:
          path: ./repo
          message: "Promote payments to dev: ${{ freight.image.tag }}"
      - uses: git-push
        config:
          path: ./repo
          targetBranch: main

