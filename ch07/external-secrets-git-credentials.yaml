# Chapter: 12. Multi-Team and Platform Patterns
# Section: Credential Management
# Kargo version: 1.x
# Status: UNVERIFIED

# Managed by External Secrets Operator, populated by platform team
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: git-credentials
  namespace: payments
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: git-creds
    creationPolicy: Owner
  data:
  - secretKey: username
    remoteRef:
      key: kargo/git-credentials
      property: username
  - secretKey: password
    remoteRef:
      key: kargo/git-credentials
      property: token

