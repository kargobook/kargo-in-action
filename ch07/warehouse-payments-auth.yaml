# payments-warehouse.yaml
apiVersion: kargo.akuity.io/v1alpha1
kind: Warehouse
metadata:
  name: payments-warehouse
  namespace: kargo
spec:
  subscriptions:
  - image:
      repoURL: ghcr.io/kargobook/payments-api
      semverConstraint: ">=2.0.0 <3.0.0"
---
