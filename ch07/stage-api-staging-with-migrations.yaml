# Chapter: 11. Multi-Service Promotion
# Section: Schema Migrations and Coordinated Infrastructure
# Kargo version: 1.x
# Status: UNVERIFIED

apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: api-staging
  namespace: kargo
spec:
  requestedFreight:
  - origin:
      kind: Warehouse
      name: api-warehouse
    sources:
      stages:
      - api-dev
  - origin:
      kind: Warehouse
      name: migrations-warehouse
    sources:
      stages:
      - migrations-dev
  promotionTemplate:
    spec:
      steps:
      - uses: git-clone
        config:
          repoURL: https://github.com/kargobook/demo-gitops.git
          checkout:
          - branch: main
            path: ./repo
      - uses: kustomize-set-image
        config:
          path: ./repo/apps/api/envs/staging
          images:
          - image: ghcr.io/example/api-service
      - uses: kustomize-set-image
        config:
          path: ./repo/apps/migrations/envs/staging
          images:
          - image: ghcr.io/example/api-migrations
      - uses: git-commit
        config:
          path: ./repo
          message: "Coordinate api and migrations to staging"
      - uses: git-push
        config:
          path: ./repo
          targetBranch: main

