# Chapter: 3. Getting started with Kargo
# Section: Configuring Git credentials for Kargo
# Kargo version: 1.x
# Status: UNVERIFIED

apiVersion: v1
kind: Secret
metadata:
  name: demo-git-creds
  namespace: demo
  labels:
    kargo.akuity.io/cred-type: git
stringData:
  repoURL: https://github.com/<your-github-username>/demo-gitops.git
  username: <your-git-username>
  password: <your-personal-access-token>

