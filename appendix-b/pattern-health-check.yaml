# Chapter: Appendix B. Built-In Promotion Step Reference
# Section: Health Check After Deployment
# Kargo version: 1.x
# Status: UNVERIFIED

steps:
- uses: git-clone
  # ... standard git update steps ...
- uses: git-commit
  as: commit
  config:
    path: ./out
    message: "chore: promote to production"
- uses: git-push
  config:
    path: ./out
- uses: argocd-update
  config:
    apps:
    - name: my-app-production
      sources:
      - repoURL: https://github.com/kargobook/demo-gitops.git
        desiredRevision: ${{ outputs['commit'].commit }}
- uses: http
  retry:
    timeout: 30s
  config:
    url: https://prod.example.com/health
    successExpression: response.status == 200

